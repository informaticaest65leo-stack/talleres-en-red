<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Pac-Man</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: black;
            margin: 0;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2em;
        }
        #score {
            color: white;
            font-size: 1.5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="score">Puntuación: 0</div>
    <div id="game-over">¡Juego Terminado!</div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        let score = 0;

        const tileSize = 20;
        const pacman = {
            x: tileSize,
            y: tileSize,
            dx: tileSize,
            dy: 0,
            radius: tileSize / 2,
            color: 'yellow'
        };
        const food = {
            x: tileSize * 10,
            y: tileSize * 10,
            color: 'red'
        };

        function drawPacman() {
            ctx.beginPath();
            ctx.arc(pacman.x, pacman.y, pacman.radius, 0.2 * Math.PI, 1.8 * Math.PI);
            ctx.lineTo(pacman.x, pacman.y);
            ctx.fillStyle = pacman.color;
            ctx.fill();
            ctx.closePath();
        }

        function drawFood() {
            ctx.beginPath();
            ctx.arc(food.x, food.y, pacman.radius / 2, 0, 2 * Math.PI);
            ctx.fillStyle = food.color;
            ctx.fill();
            ctx.closePath();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updatePacmanPosition() {
            pacman.x += pacman.dx;
            pacman.y += pacman.dy;
        }

        function checkCollision() {
            if (pacman.x < 0 || pacman.x > canvas.width || pacman.y < 0 || pacman.y > canvas.height) {
                gameOver();
            }
        }

        function gameOver() {
            document.getElementById('game-over').style.display = 'block';
            clearInterval(gameLoop);
        }

        function eatFood() {
            if (pacman.x === food.x && pacman.y === food.y) {
                food.x = Math.floor(Math.random() * (canvas.width / tileSize)) * tileSize;
                food.y = Math.floor(Math.random() * (canvas.height / tileSize)) * tileSize;
                score++;
                scoreDisplay.textContent = `Puntuación: ${score}`;
            }
        }

        function game() {
            clearCanvas();
            drawFood();
            drawPacman();
            updatePacmanPosition();
            checkCollision();
            eatFood();
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                    pacman.dx = 0;
                    pacman.dy = -tileSize;
                    break;
                case 'ArrowDown':
                    pacman.dx = 0;
                    pacman.dy = tileSize;
                    break;
                case 'ArrowLeft':
                    pacman.dx = -tileSize;
                    pacman.dy = 0;
                    break;
                case 'ArrowRight':
                    pacman.dx = tileSize;
                    pacman.dy = 0;
                    break;
            }
        });

        const gameLoop = setInterval(game, 150);
    </script>
</body>

</html>
